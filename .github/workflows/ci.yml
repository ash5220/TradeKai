name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: tradekai
          POSTGRES_PASSWORD: tradekai
          POSTGRES_DB: tradekai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Download modules
        working-directory: backend
        run: go mod download
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://tradekai:tradekai@localhost:5432/tradekai_test?sslmode=disable
          JWT_SECRET: test-secret-for-ci-only
          MARKET_PROVIDER: simulated
          ORDER_PROVIDER: simulated
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.out
          flags: backend
        continue-on-error: true

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Start integration dependencies (docker-compose)
        run: docker compose -f deployments/docker-compose.yml up -d db
      - name: Wait for database health
        run: |
          for i in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' tradekai-db 2>/dev/null || true)
            if [ "$status" = "healthy" ]; then
              echo "Database is healthy"
              exit 0
            fi
            echo "Waiting for database health..."
            sleep 2
          done
          echo "Database did not become healthy in time"
          docker compose -f deployments/docker-compose.yml logs db
          exit 1
      - name: Run integration tests
        working-directory: backend
        run: go test -race -tags=integration ./internal/integration/...
      - name: Stop integration dependencies
        if: always()
        run: docker compose -f deployments/docker-compose.yml down -v

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, backend-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Build binary
        working-directory: backend
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /tmp/server ./cmd/server
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: tradekai-backend:ci

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Test
        working-directory: frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
        continue-on-error: true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build -- --configuration production
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: tradekai-frontend:ci
