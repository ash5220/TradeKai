version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: tradekai-db
    environment:
      POSTGRES_USER: tradekai
      POSTGRES_PASSWORD: tradekai
      POSTGRES_DB: tradekai
    ports:
      - "5432:5432"
    volumes:
      - tradekai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradekai -d tradekai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tradekai-backend
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tradekai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  tradekai_pgdata:
