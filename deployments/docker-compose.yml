services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: tradekai-db
    environment:
      POSTGRES_USER: tradekai
      POSTGRES_PASSWORD: tradekai
      POSTGRES_DB: tradekai
    ports:
      - "5432:5432"
    volumes:
      - tradekai_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradekai -d tradekai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tradekai-backend
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://tradekai:tradekai@db:5432/tradekai?sslmode=disable
    expose:
      - "8080"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/busybox",
          "wget",
          "-qO-",
          "http://127.0.0.1:8080/api/v1/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tradekai-frontend
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: tradekai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  tradekai_pgdata:
