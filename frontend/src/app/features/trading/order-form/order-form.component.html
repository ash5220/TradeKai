<div class="card">
  <h3>Place Order</h3>
  <form [formGroup]="form" (ngSubmit)="submit()" class="order-form">
    <div class="field">
      <label>Symbol</label>
      <input formControlName="symbol" placeholder="e.g. AAPL" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>Side</label>
        <select formControlName="side">
          <option value="buy">Buy</option>
          <option value="sell">Sell</option>
        </select>
      </div>
      <div class="field">
        <label>Type</label>
        <select formControlName="type">
          <option value="market">Market</option>
          <option value="limit">Limit</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Quantity</label>
        <input
          type="number"
          formControlName="quantity"
          min="0.0001"
          step="0.0001"
        />
      </div>
      @if (form.value.type === "limit") {
        <div class="field">
          <label>Limit Price</label>
          <input
            type="number"
            formControlName="limitPrice"
            min="0.01"
            step="0.01"
          />
        </div>
      }
    </div>
    @if (error()) {
      <p class="form-error">{{ error() }}</p>
    }
    @if (success()) {
      <p class="form-success">Order submitted.</p>
    }
    <button
      type="submit"
      class="btn-primary"
      [disabled]="form.invalid || loading()"
    >
      {{ loading() ? "Submitting…" : "Submit Order" }}
    </button>
  </form>
</div>
